name: substrate-miner
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pandas
  - matplotlib
  - biopython
  - mafft
  - clustalo
  - weblogo
  - pip
  - pip:
      - requests
      - click
      - pyyaml
      - certifi
      - fonttools
      - pillow

  # Platform-specific dependencies
  - blas=*=mkl  # Ensures MKL-based performance for NumPy/Scipy where possible
  - pip:
      - six  # Ensures compatibility across Python 2/3
  - pip:
      - urllib3  # Avoids missing SSL-related packages

# OS-Specific Handling
#  - m2w64-toolchain  # [win] Windows compilers
#  - openmp  # [osx] macOS needs OpenMP separately