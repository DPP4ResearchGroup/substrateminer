name: substrateminer releasing

on:
  push:
    branches: [main, develop, features]
  pull_request:
    branches: [main, develop, releases]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"] #, "macos-latest"
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # Change as needed
      
      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: 'latest'
          channel-priority: true
          auto-update-conda: false
          auto-activate-base: false
          environment-file: environment-${{ runner.os }}.yml
          activate-environment: substrate-miner

      - name: Set environment variable for hash
        run: echo "ENV_FILE=environment-${{ runner.os }}.yml" >> $GITHUB_ENV

      - name: Cache conda environment
        uses: actions/cache@v3
        with:
          path: |
            /home/runner/conda_pkgs_dir
            /Users/runner/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ hashFiles(env.ENV_FILE) }}
          restore-keys: |
              ${{ runner.os }}-conda-${{ hashFiles(env.ENV_FILE) }}

      - name: Run CLI tests with pip
        run: |
          pip install -e .
          substrateminer --help

      - name: Run tests with unittest
        run: |
          conda run -n substrate-miner python -m unittest discover -s unittests -p "test_*.py"